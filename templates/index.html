<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ask-gdpr — Frag die DSGVO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇪🇺</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="chat">
    <header>
      <h1>ask-gdpr</h1>
      <p>Frag die DSGVO — Antworten nur aus dem Gesetzestext, mit Artikel-Quellen.</p>
    </header>
    <section id="messages" aria-live="polite"></section>
    <form id="ask-form">
      <input id="question" type="text" maxlength="500" required
             placeholder="z.B. Muss ich eine Datenpanne melden?" autocomplete="off">
      <button type="submit">Fragen</button>
    </form>
    <footer><small>Keine Rechtsberatung. Quelle: DSGVO (EU 2016/679).</small></footer>
  </main>
  <script>
    const form = document.getElementById("ask-form");
    const input = document.getElementById("question");
    const messages = document.getElementById("messages");

    function add(role, text, sources = []) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      if (sources.length) {
        const src = document.createElement("div");
        src.className = "sources";
        src.textContent = "Quellen: " + sources.map(s => `Art. ${s.number} (${s.title})`).join(" · ");
        div.appendChild(src);
      }
      messages.appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
      return div;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      add("user", question);
      input.value = "";
      const pending = add("bot pending", "Denke nach …");
      try {
        const response = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await response.json();
        pending.remove();
        if (!response.ok) {
          add("bot error", data.error || "Fehler. Versuch's nochmal.");
        } else {
          add("bot", data.answer, data.sources);
        }
      } catch {
        pending.remove();
        add("bot error", "Verbindungsfehler. Läuft der Server?");
      }
    });
  </script>
</body>
</html>
